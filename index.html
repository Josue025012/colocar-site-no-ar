<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>URBAN Streetwear</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">URBAN</div>

  <nav>
    <a href="#">Início</a>
    <a href="#">Masculino</a>
    <a href="#">Feminino</a>
    <a href="#">Drops</a>
  </nav>

  <div class="cart-icon" onclick="toggleCart()">
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<section class="hero">
  <h1>DROP 2026</h1>
  <p>Streetwear de alto nível</p>
  <button>Explorar coleção</button>
</section>

<section class="products">
  <h2>🔥 Destaques</h2>

  <div class="grid" id="product-list"></div>
</section>

<!-- CARRINHO -->
<div class="cart" id="cart">
  <h2>Seu Carrinho</h2>
  <div id="cart-items"></div>
  <p>Total: R$ <span id="cart-total">0</span></p>

  <button onclick="checkout()">Finalizar compra</button>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
  <h2>Pagamento</h2>
  <p>Escolha o método:</p>

  <button onclick="pay('pix')">PIX</button>
  <button onclick="pay('cartao')">Cartão</button>
</div>

<footer>
  <p>© 2026 URBAN Streetwear</p>
</footer>

<script src="script.js"></script>
</body>
</html>
